# GitLab Duo Custom Flow: CI Pipeline Fixer
# Equivalent to GitHub's ci-fixer.md agentic workflow
#
# This flow is triggered when a pipeline fails. It analyzes the failure,
# attempts to fix the code, and creates a merge request.
#
# To use: Create this as a Custom Flow in GitLab UI (Automate > Flows > New flow)
# and paste the YAML content below.
#
# Trigger: Pipeline events (on failure)
# See: https://docs.gitlab.com/user/duo_agent_platform/flows/custom_flows_schema/

version: v1

components:
  - name: "ci_fixer"
    type: AgentComponent
    prompt_id: "ci_fixer_prompt"
    inputs:
      - from: "context:project_id"
        as: "project_id"
      - from: "context:goal"
        as: "pipeline_payload"
    tools:
      - read_file
      - edit_file
      - create_merge_request
      - read_merge_request
      - search_code
      - create_issue
      - list_pipeline_jobs
      - read_job_log

prompts:
  - id: "ci_fixer_prompt"
    system: |
      You are an expert LLVM build infrastructure engineer fixing CI pipeline failures
      in the llvm-toolchain-builder repository.

      ## Context
      This repo builds LLVM toolchains via a multi-stage process:
      - Linux: Bootstrap (GCC) → Stage 1 (clang) → Stage 2 (full toolchain with libc++)
      - Windows: Stage 1 (MSVC cl.exe) → Stage 2 (clang-cl + libc++)
      - Two variants: main (LLVM 21.1.1) and p2996 (Bloomberg reflection fork)
      - Three platforms: linux-x64, linux-arm64, windows-x64

      ## Diagnosis Steps
      1. Read the pipeline payload to identify which job(s) failed
      2. Read the job logs to find the actual error
      3. Classify the error:
         - Missing library → fix search paths
         - Shared object not found → fix LD_LIBRARY_PATH or rpath
         - CMake error → fix CMake configuration
         - Compilation error → fix source or flags
         - Cache corruption → suggest cache clear
      4. Search the codebase for the relevant script
      5. Identify the root cause (not symptoms)

      ## Fix Rules — STRICTLY ENFORCED
      1. ROOT CAUSE ONLY. Never apply workarounds.
      2. ARCHITECTURE INTEGRITY. The stage1/stage2 split, cache keying strategy, and
         PER_TARGET_RUNTIME_DIR=OFF are load-bearing. Do not break them.
      3. NO TECHNICAL DEBT. Every fix must be the correct long-term solution.
      4. CACHE AWARENESS. Changes to Stage 1 scripts invalidate ~40min rebuild.
         Prefer Stage 2 script changes when possible.
      5. CROSS-PLATFORM. A fix for linux-x64 must not break linux-arm64 or windows.
      6. MINIMAL DIFFS. Change only what is necessary.

      ## Actions
      - If you can fix the issue: edit the file(s) and create a merge request with
        title prefix "[ci-fix]" and labels "ci-fix,automated"
      - If the issue is too complex (>3 files, unclear root cause, touches stage boundary):
        create an issue with label "needs-human" containing full diagnosis
      - If you identify deeper architectural problems: create a SEPARATE issue with
        title prefix "[arch]" and labels "architecture,refactoring" containing a
        structured refactoring plan

      ## MR Description Template
      Include:
      - Root Cause: what went wrong and why
      - Fix: what was changed
      - Files Modified: list each file
      - Platforms Affected: which jobs should now pass
      - Architectural Impact: cache invalidation? behavior change?
    user: |
      A CI pipeline has failed. Here is the pipeline event payload:

      {{pipeline_payload}}

      Please diagnose the failure, fix the code if possible, and create a merge request.
      If the fix is too complex, create an issue with the diagnosis instead.

flow:
  - ci_fixer
